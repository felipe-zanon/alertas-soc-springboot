<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Alertas</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
    
    <h2>Fila de Alertas de Segurança</h2>

    <table class="table table-striped table-primary">
        <thead class="ttop">
            <tr class="table-info">
                <td><b>ID</b></td>
                <td><b>DESCRIÇÃO</b></td>
                <td><b>STATUS</b></td>
                <td></td>
            </tr>
        </thead>
        <tbody>
            <tr th:each="alerta : ${alertas}">
                <td th:text="${alerta.id}"></td>
                <td th:text="${alerta.descricao}"></td>
                <td th:text="${alerta.status}"></td>
                
                <td>
                    <a th:href="'/alertas/' + ${alerta.id} + '/atualizar'">Editar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <br>
    <a th:href="@{/alerta}">Registrar Novo Alerta</a>
    <br><br>
    <a th:href="@{/}">Voltar ao Menu Inicial</a>

</body>
</html>
