<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Painel SOC - Alertas</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary">Fila de Alertas de Segurança</h2>
            <a th:href="@{/alerta}" class="btn btn-success fw-bold">+ Novo Alerta</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>DESCRIÇÃO</th>
                            <th>STATUS</th>
                            <th class="text-center">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="alerta : ${alertas}">
                            <td class="align-middle" th:text="${alerta.id}"></td>
                            <td class="align-middle" th:text="${alerta.descricao}"></td>
                            <td class="align-middle">
                                <span class="badge bg-secondary" th:text="${alerta.status}"></span>
                            </td>
                            <td class="text-center align-middle">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="'/alertas/' + ${alerta.id} + '/atualizar'" class="btn btn-sm btn-primary">
                                        Editar
                                    </a>
                                    
                                    <form th:action="'/alertas/' + ${alerta.id} + '/deletar'" method="post" class="m-0">
                                        <button type="submit" class="btn btn-sm btn-danger">
                                            Deletar
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/}" class="text-decoration-none">← Voltar ao Menu Inicial</a>
        </div>
    </div>

</body>
</html>
