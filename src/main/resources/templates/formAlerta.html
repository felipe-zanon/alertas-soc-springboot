<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar Alerta</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <div class="container mt-5" style="max-width: 600px;">
        
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Registrar Alerta de Segurança</h4>
            </div>
            
            <div class="card-body">
                <form action="#" th:action="@{/alerta/salvar}" method="post" th:object="${alerta}">
                    
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição do Incidente:</label>
                        <input type="text" th:field="*{descricao}" class="form-control" placeholder="Descrição" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">Cadastrar Alerta</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-3 text-center">
            <a th:href="@{/}" class="text-decoration-none text-muted">Voltar ao Menu</a>
        </div>

    </div>

</body>
</html>
