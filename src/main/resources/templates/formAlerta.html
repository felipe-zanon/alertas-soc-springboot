<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Alertas</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
    
    <h2>Registrar Alerta de Segurança</h2>

    <form action="#" th:action="@{/alerta/salvar}" method="post" th:object="${alerta}">
        
        <input type="hidden" th:field="*{id}">
        
        Descrição: <input type="text" th:field="*{descricao}"><br><br>
        
        <input type="submit" value="Cadastrar Alerta">

    </form>

    <br>
    <a th:href="@{/}">Voltar ao Menu Inicial</a>

</body>
</html>
