<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Atualizar Alerta</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <div class="container mt-5" style="max-width: 600px;">
        
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Atualizar Alerta (ID: <span th:text="${id}"></span>)</h4>
            </div>
            
            <div class="card-body">
                <form action="#" th:action="@{'/alertas/' + ${id} + '/atualizar'}" method="post" th:object="${alerta}">
                    
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição:</label>
                        <input type="text" th:field="*{descricao}" class="form-control" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Status da Investigação:</label>
                        <select th:field="*{status}" class="form-select">
                            <option th:each="statusOpt : ${T(com.felipe.soc.model.StatusAlerta).values()}"
                                    th:value="${statusOpt}"
                                    th:text="${statusOpt}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-3 text-center">
            <a th:href="@{/listar/alertas}" class="text-decoration-none text-muted">← Voltar para a Fila</a>
        </div>

    </div>

</body>
</html>
